<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - Bellwood Hotel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: #121212; /* Warna latar gelap profesional */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 380px;
            text-align: center;
            border: 1px solid #333;
        }

        .login-card h2 {
            color: #FFD700;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .login-card p {
            color: #888;
            font-size: 13px;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #FFD700;
            font-size: 12px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        .form-group input:focus {
            border-color: #FFD700;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #FFD700;
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #e6c200;
            transform: translateY(-2px);
        }

        .back-link {
            display: block;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 12px;
        }

        .back-link:hover {
            color: #FFD700;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Admin Access</h2>
        <p>Authorized Personnel Only</p>

        <form action="admin-homepage.html">
            <div class="form-group">
                <label>Admin ID</label>
                <input type="text" placeholder="Enter Admin ID" required>
            </div>

            <div class="form-group">
                <label>Security Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Secure Login</button>
        </form>

        <a href="login.html" class="back-link">Standard User Login</a>
    </div>

</body>
</html>
