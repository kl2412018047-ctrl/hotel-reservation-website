<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Confirmation - Bellwood Hotel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('image/hotel_bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .booking-container {
            background: #fff;
            color: #333;
            width: 450px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
        }

        h2 {
            margin-top: 0;
            color: #1a1a1a;
            border-bottom: 2px solid #FFD700;
            display: inline-block;
            padding-bottom: 5px;
            margin-bottom: 25px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        .price-summary {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            border-left: 5px solid #FFD700;
            text-align: left;
        }

        .btn-confirm {
            background: #1a1a1a;
            color: white;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-confirm:hover {
            background: #FFD700;
            color: #000;
        }

        .cancel-link {
            display: block;
            margin-top: 15px;
            color: #888;
            text-decoration: none;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="booking-container">
        <h2>Confirm Booking</h2>
        
        <form action="hotel_reservation.html">
            <div class="form-group">
                <label>Guest Name</label>
                <input type="text" placeholder="Your full name" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="example@mail.com" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" placeholder="012-3456789" required>
            </div>

            <div class="price-summary">
                <p style="margin: 0; font-size: 14px; color: #777;">Estimated Total:</p>
                <p style="margin: 0; font-size: 22px; font-weight: bold; color: #1a1a1a;">RM 550.00</p>
            </div>
			<div class="price-summary">
    <p>Booking Successful!</p>
    <a href="booking-history.html" class="btn-confirm" style="text-decoration: none;">View My History</a>
</div>

            <button type="submit" class="btn-confirm">Complete Reservation</button>
            
            <a href="hotel_reservation.html" class="cancel-link">Cancel and Return Home</a>
        </form>
    </div>

</body>
</html>
